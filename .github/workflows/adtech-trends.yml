name: Ad Tech Trends Digest

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic --upgrade

      - name: Create output directory
        run: mkdir -p output/trends

      - name: Run trends agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python scripts/fetch_trends.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/trends/
          git diff --staged --quiet || git commit -m "trends: $(date +%Y-%m-%d)"
          git push
